<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body>
    <header>
      <section>
        <h1>Please Don't Contact Us</h1>
        <div class="logo">
          <img
            src="images/funny-secret-agent-cartoon-illustration-68311208.webp"
            alt="Cartoon man in a grey trench coat and hat, with a black eye mask, holding a briefcase and looking around suspiciously."
            width="110"
          />
          <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
          </nav>
        </div>
      </section>
    </header>

    <main>
      <form action="#" class="contact-form">
        <div class="name">
          <label>Your Name:</label>
          <input type="text" name="name" />
        </div>

        <div class="email">
          <label>Your Email:</label>
          <input type="email" name="email" />
        </div>

        <div class="message">
          <label>Your Message:</label>
          <textarea name="message" rows="5"></textarea>
        </div>

        <div class="btn">
          <input type="submit" />
        </div>
      </form>
    </main>

    <footer class="footer">
      <p>
        Created by: Corbin Nurse <br />
        Follow us on <a href="#">[Social Media]</a>
      </p>
    </footer>
  </body>
</html>
